# Database
spring.datasource.url=jdbc:postgresql://localhost:5432/ozdeals
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Amazon PA-API
amazon.paapi.access-key=${AMAZON_ACCESS_KEY}
amazon.paapi.secret-key=${AMAZON_SECRET_KEY}
amazon.paapi.partner-tag=${AMAZON_PARTNER_TAG}
amazon.paapi.host=webservices.amazon.com.au
amazon.paapi.region=us-east-1
amazon.paapi.marketplace=www.amazon.com.au
# Pages per keyword (1–10, 10 items each). Increase cautiously — each page is an API call.
amazon.paapi.max-pages=1

# Telegram
telegram.bot.token=${TELEGRAM_BOT_TOKEN}
telegram.channel.id=${TELEGRAM_CHANNEL_ID}

# Scheduler — runs every 10 minutes
deals.scheduler.cron=0 */10 * * * *

# Product sources — enable/disable independently
# Set amazon.enabled=true and fill Amazon credentials in .env before production use
sources.amazon.enabled=false
sources.mock.enabled=true
sources.awin.enabled=false
