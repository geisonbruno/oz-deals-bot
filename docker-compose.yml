version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: ozdeals-postgres
    environment:
      POSTGRES_DB: ozdeals
      POSTGRES_USER: ${DB_USERNAME:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  postgres_data:
